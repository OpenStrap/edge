name: openstrap_edge
description: "OpenStrap — open-source WHOOP 4.0 companion. BLE drain → raw-first local store → cloud sync."
publish_to: 'none'
version: 0.6.0+16

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local pure-Dart packages — the protocol byte codecs and the metric/analytics
  # engine. Replace the old cloud backend: decode happens on-device, and the
  # local re-layer computes metrics here (see lib/data/local_repository.dart +
  # lib/compute/derivation_engine.dart). The analytics package now points at the
  # 1 Hz-native family (import via `package:openstrap_analytics/onehz.dart`).
  openstrap_protocol:
    git:
      url: https://github.com/OpenStrap/protocol.git
      ref: main
  openstrap_analytics:
    git:
      url: https://github.com/OpenStrap/analytics.git
      ref: main

  # BLE — flutter_blue_plus is the maintained cross-platform GATT client.
  flutter_blue_plus: ^1.36.8

  # Local raw-first storage.
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # Background scheduled derivation (the heavy nightly pass: sleep staging +
  # 24-h spectra). Android: a real OS-scheduled WorkManager job. iOS: see the
  # honest caveat in lib/compute/background_derivation.dart — app-killed heavy
  # compute is opportunistic via BGTaskScheduler, never guaranteed.
  workmanager: ^0.9.0

  # HTTP — retained ONLY for the OTA self-update pointer (see lib/sync/update_service.dart)
  # and the AI Coach's direct LLM (BYOK) calls. No backend / auth traffic anymore.
  http: ^1.2.2

  # State + small settings persistence.
  provider: ^6.1.2
  shared_preferences: ^2.3.3

  # Charts (for the future server-analytics view).
  fl_chart: ^0.69.2

  # Modern type (Space Grotesk display + Inter body) and a professional icon set.
  google_fonts: ^6.2.1
  hugeicons: ^0.0.11

  # Share recap cards (rendered card → image → share sheet).
  share_plus: ^10.1.4

  # File picker for data imports (NOOP raw CSV, Edge .db backup, WHOOP export CSV).
  file_picker: ^8.1.6

  # Apple Health (HealthKit, iOS) + Google Health Connect (Android) — export each
  # day's derived metrics to the platform health store.
  health: ^11.1.1
  # Open the Health Connect app/settings so the user can grant per-app access
  # manually (the reliable path when its in-app request dialog is locked out).
  android_intent_plus: ^5.1.0

  # Opt-in, consent-gated companion telemetry + health-data contribution:
  #   • device_info_plus  — OEM / model / OS for crash-report context
  #   • battery_plus       — phone battery + charging state (upload gate)
  #   • connectivity_plus  — Wi-Fi check (only upload the heavy .db on unmetered)
  #   • uuid               — stable anonymous install id (the device_id anchor)
  device_info_plus: ^10.1.2   # capped <11 by `health`
  battery_plus: ^6.1.0
  connectivity_plus: ^6.1.0
  uuid: ^4.5.1

  # Home/lock-screen widget bridge (writes a snapshot to the App Group → WidgetKit).
  home_widget: ^0.6.0

  # OS-level notifications (band battery low / charging, health alerts, recovery,
  # scheduled reminders). The single display layer; see lib/notify/. Local +
  # scheduled only (no FCM — the app is cloud-free).
  flutter_local_notifications: ^18.0.1
  # zonedSchedule needs an initialized tz database + the device's IANA zone, so
  # wind-down / weekly-recap nudges fire at the right wall-clock time.
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # OTA self-update (Android sideload): read our own version, download + install the
  # signed APK from the backend's update pointer, with a browser fallback.
  package_info_plus: ^8.1.0
  ota_update: ^7.1.0
  url_launcher: ^6.3.0
  notification_listener_service: ^1.0.0
  installed_apps: ^2.1.1
  flutter_secure_storage: ^10.3.1
  gpt_markdown: ^1.1.7

# NOTE: to build against the in-tree sibling packages during local development,
# create a (gitignored) pubspec_overrides.yaml — pub auto-detects it. Keeping the
# overrides OUT of this file means CI/release resolves the pinned git refs above
# (the siblings aren't checked out in CI, so a committed path override fails
# `flutter pub get` with exit 66).

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.8
  flutter_launcher_icons: ^0.13.1
  sqflite_common_ffi: ^2.4.0+3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#F4F1EC"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
