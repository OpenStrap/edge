name: whoop_connect
description: WHOOP 4.0 BLE companion — real-time HR, IMU, PPG streaming.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.32.12
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  lottie: ^3.1.2
  fl_chart: ^0.69.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  shared_preferences: ^2.3.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
