name: build

on:
  push:
    tags: ['v*']        # the only trigger: pushing a version tag cuts a release

permissions:
  contents: write       # needed to create the GitHub Release

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          # PINNED, not `channel: stable` — that floats forward every run and
          # has twice broken this exact release pipeline on version drift:
          # a newer Flutter removed/moved CupertinoPageTransitionsBuilder
          # (theme.dart wouldn't compile) and changed how --no-codesign
          # propagates to the Watch companion target (iOS build demanded a
          # signing team despite --no-codesign). This version is verified
          # against the current codebase (376 tests + a local release build
          # of both platforms). Bump deliberately, not by drift.
          flutter-version: '3.41.6'

      # The single companion URL (announcements, OTA, telemetry, import) comes
      # from a repo secret, written into .env and baked in via --dart-define.
      - name: Write .env
        run: |
          echo "COMPANION_URL=${{ secrets.COMPANION_URL }}" > .env
          echo "BACKEND_URL=${{ secrets.BACKEND_URL }}" >> .env

      # Decode the release keystore from a secret. The gradle config picks these
      # env vars up (ANDROID_KEYSTORE_PATH etc.) and signs the release build.
      - name: Restore release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - run: flutter pub get

      - name: Mount Firebase Secrets
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 -d > android/app/google-services.json
          echo "$FIREBASE_OPTIONS_DART_B64" | base64 -d > lib/firebase_options.dart

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --dart-define-from-file=.env

      - name: Name the APK after the version
        id: rename
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/openstrap-edge-${GITHUB_REF_NAME}.apk
          echo "apk=dist/openstrap-edge-${GITHUB_REF_NAME}.apk" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: openstrap-edge-apk
          path: ${{ steps.rename.outputs.apk }}

      # Publish a Release with the signed APK attached so people download a real
      # .apk, not a zipped CI artifact.
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk }}
          generate_release_notes: true

  # Unsigned iOS .ipa for sideloading (AltStore / Sideloadly / TrollStore). It is
  # NOT App Store signed — users re-sign it with their own Apple ID on install.
  # Note: free-account sideloads re-sign with a different team id, so App Group
  # features (home widget + Live Activity) may not work; there is no iOS OTA
  # auto-update either (that path installs an .apk). Attached to the same release.
  #
  # The Watch companion app is deliberately NOT embedded in this artifact — see
  # the "Strip Watch companion" step below. It is structurally impossible for
  # it to survive a per-user free-account resign: the Watch app's Info.plist
  # carries a literal WKCompanionAppBundleIdentifier string that must exactly
  # equal the phone app's bundle id, and every free-account resign (Sideloadly,
  # AltStore, ...) mints its own unique per-user bundle id suffix to satisfy
  # Apple's global App-ID-uniqueness rule but has no reason to know it also
  # needs to patch that unrelated-looking key inside a different nested
  # bundle's plist — none of them do. Unlike widget/Live-Activity extensions
  # (which associate with the parent purely by PlugIns/ embedding + a simple
  # bundle-id prefix, both of which survive naive resigning fine), this is not
  # a Sideloadly bug to work around — it fails identically under every
  # resigner. Full Watch support only ever works building from source with a
  # consistent signing identity (see ios/Config/Signing.xcconfig + `flutter
  # run`/Xcode direct install), where $(APP_BUNDLE_IDENTIFIER) threads through
  # every target's plist, including this one, at build time.
  ios:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          # PINNED, not `channel: stable` — that floats forward every run and
          # has twice broken this exact release pipeline on version drift:
          # a newer Flutter removed/moved CupertinoPageTransitionsBuilder
          # (theme.dart wouldn't compile) and changed how --no-codesign
          # propagates to the Watch companion target (iOS build demanded a
          # signing team despite --no-codesign). This version is verified
          # against the current codebase (376 tests + a local release build
          # of both platforms). Bump deliberately, not by drift.
          flutter-version: '3.41.6'

      - name: Write .env
        run: |
          echo "COMPANION_URL=${{ secrets.COMPANION_URL }}" > .env
          echo "BACKEND_URL=${{ secrets.BACKEND_URL }}" >> .env

      - name: Install flutterfire (required by Crashlytics Xcode build phase)
        run: dart pub global activate flutterfire_cli 1.4.0

      - run: flutter pub get

      - name: Mount Firebase Secrets
        env:
          GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 }}
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
        run: |
          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 -d > ios/Runner/GoogleService-Info.plist
          echo "$FIREBASE_OPTIONS_DART_B64" | base64 -d > lib/firebase_options.dart

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign --dart-define-from-file=.env

      # See the job-level comment above: the Watch companion cannot survive a
      # per-user free-account resign under any sideloading tool (Sideloadly,
      # AltStore, ...) — it fails install for every such user, every time, with
      # no per-app-side fix possible, because the resign step would need to
      # rewrite a cross-reference key inside a different nested bundle's plist
      # that these tools don't special-case. Drop it here so the artifact this
      # job ships actually installs; source builds keep full Watch support.
      - name: Strip Watch companion (can't survive per-user resigning)
        run: rm -rf "build/ios/iphoneos/Runner.app/Watch"

      - name: Package unsigned IPA
        id: ipa
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          IPA="$GITHUB_WORKSPACE/openstrap-edge-${GITHUB_REF_NAME}-unsigned.ipa"
          zip -qr -y "$IPA" Payload
          echo "ipa=openstrap-edge-${GITHUB_REF_NAME}-unsigned.ipa" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: openstrap-edge-ipa
          path: ${{ steps.ipa.outputs.ipa }}

      # Attach to the same Release the android job created/updates (upsert by tag).
      - name: Attach IPA to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.ipa.outputs.ipa }}
